# GitHub Pages/Jekyll output allowlist by exclusion.
# Runtime assets stay public; source, tests, scripts, docs, and local-only
# support folders do not.
exclude:
  - .claude/
  - .discovery/
  - .githooks/
  - .github/
  - .remember/
  - android/
  - content/
  - data/clinical-intelligence/
  - docs/
  - ios/
  - mcp/
  - node_modules/
  - output/
  - private/
  - scratch/
  - scripts/
  - src/
  - tests/
  - CHANGELOG.md
  - COMPLIANCE.md
  - CONTRIBUTING.md
  - CONTRIBUTING-content.md
  - REFACTOR_MAP.md
  - REMAINING-WORK.md
  - LICENSE
  - OPTIN_NATIVE_WRAPPER
  - README.md
  - SECURITY.md
  - capacitor.config.json
  - package-lock.json
  - package.json
  - tailwind.config.js
  - vitest.config.js
  - whats-new-source-gaps.md
