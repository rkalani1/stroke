name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test:unit

      - name: Upload vitest output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output
          path: |
            output/diagnostics/
            test-output/
          if-no-files-found: ignore

  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browsers across runs to avoid the ~80MB download every
      # invocation. Cache key keyed on the package-lock so it auto-busts when
      # the playwright version changes. Only safe inputs are interpolated:
      # runner.os and hashFiles() are runner-controlled, not user-controlled.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Validate churn profile schema
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          npm run validate:evidence-churn-profiles 2>&1 | tee output/diagnostics/churn-profile-validation.log

      - name: Validate QA latency profile schema
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          npm run validate:qa-latency-profiles 2>&1 | tee output/diagnostics/qa-latency-profile-validation.log

      - name: Build
        run: npm run build

      - name: Validate citations and run local smoke
        run: npm test

      - name: Run adaptive strict local latency smoke
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          npm run qa:latency-adaptive-local 2>&1 | tee output/diagnostics/qa-latency-adaptive-local.log

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-smoke-artifacts
          path: |
            output/playwright
            output/diagnostics/churn-profile-validation.log
            output/diagnostics/qa-latency-profile-validation.log
            output/diagnostics/qa-latency-adaptive-local.log
            docs/evidence-churn-profiles.json
            docs/qa-latency-profiles.json
          if-no-files-found: ignore

  adaptive-latency-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run adaptive strict QA (local + live)
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          npm run qa:latency-adaptive-strict 2>&1 | tee output/diagnostics/qa-latency-adaptive-strict.log

      - name: Upload adaptive latency smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-latency-smoke-artifacts
          path: |
            output/playwright
            output/diagnostics/qa-latency-adaptive-strict.log
            output/diagnostics/churn-profile-validation.log
            output/diagnostics/qa-latency-profile-validation.log
            docs/evidence-churn-profiles.json
            docs/qa-latency-profiles.json
          if-no-files-found: ignore
