# Path guard: prevent specific generated/build artifacts from landing on
# main. Native-wrapper SOURCE files (Java, Gradle config, manifests,
# launcher icons) are explicitly ALLOWED — they're the Capacitor scaffold
# that PR #18 introduces. Only the auto-generated outputs that should be
# gitignored are blocked, in case .gitignore is bypassed (e.g., via
# git add -f or a stash-pop reintroduction).
#
# Add new patterns here when new build outputs are discovered. The list
# is intentionally narrow: a path-block is appropriate only when the
# path can be uniquely identified as a build artifact.

name: main path guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject build-output paths that should be gitignored
        run: |
          set -e
          # Patterns we never want on main. Listed one-per-line so future
          # additions are easy to grep.
          PATTERNS=(
            'android/app/build/'
            'android/app/src/main/assets/public/'
            'android/app/src/main/assets/capacitor.config.json'
            'android/app/src/main/assets/capacitor.plugins.json'
            'android/build/'
            'android/.gradle/'
            'ios/App/Pods/'
            'ios/App/output/'
            'ios/App/build/'
            'ios/capacitor-cordova-ios-plugins/CordovaPluginsResources.podspec'
            'ios/capacitor-cordova-ios-plugins/resources/'
            'ios/capacitor-cordova-ios-plugins/sources/'
            'node_modules/'
            'output/'
          )
          FAILED=0
          for p in "${PATTERNS[@]}"; do
            if git ls-tree HEAD --name-only -r | grep -F "$p" >/dev/null; then
              echo "ERROR: build artifact tracked: $p"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "These paths should be gitignored. They were probably introduced"
            echo "by 'git add -f' or by a stash-pop. Move them off main."
            exit 1
          fi
          echo "Path guard OK — no build artifacts tracked on main."
