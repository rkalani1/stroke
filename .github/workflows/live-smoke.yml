name: Live Smoke Audit

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  qa-live:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install private leak-guard denylist
        env:
          PRIVATE_DENYLIST_JSON: ${{ secrets.STROKE_LEAK_GUARD_PRIVATE_DENYLIST_JSON }}
        run: |
          if [ -z "$PRIVATE_DENYLIST_JSON" ]; then
            echo "STROKE_LEAK_GUARD_PRIVATE_DENYLIST_JSON secret is required for live-smoke leak scanning." >&2
            exit 1
          fi
          printf '%s' "$PRIVATE_DENYLIST_JSON" > scripts/leak-guard-denylist.local.json
          STROKE_LEAK_GUARD_REQUIRE_PRIVATE=1 npm run check:leak-guard

      # Keep the scheduled smoke runner aligned with CI: Playwright installs the
      # package through npm, but Chromium itself lives in the runner cache.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Validate churn profile schema
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          npm run validate:evidence-churn-profiles 2>&1 | tee output/diagnostics/churn-profile-validation.log

      - name: Validate QA latency profile schema
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          npm run validate:qa-latency-profiles 2>&1 | tee output/diagnostics/qa-latency-profile-validation.log

      - name: Validate citation URL health
        run: npm run validate:citations:links

      - name: Validate citation identifier endpoints
        run: npm run validate:citations:ids

      - name: Generate evidence promotion checklist
        run: npm run evidence:promote

      - name: Generate evidence promotion templates
        run: npm run evidence:template && npm run evidence:template:p0

      - name: Generate evidence ops index
        run: npm run evidence:index

      - name: Run hard structural QA validators
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          {
            npm run validate:citations
            npm run validate:inline-citations
            npm run evidence:validate
            npm run validate:whats-new
            npm run validate:evidence-churn-profiles
            npm run validate:qa-latency-profiles
            npm run validate:evidence-promotion
            npm run validate:automedbench-lite
          } 2>&1 | tee output/diagnostics/qa-structural-validation.log

      - name: Verify live Pages artifact parity
        run: |
          node <<'NODE' > live-artifacts.txt
          const fs = require('fs');
          const base = 'https://rkalani1.github.io/stroke/';
          const artifacts = new Set([
            'index.html',
            'tailwind.css',
            'offline.html',
            'app.js',
            'data/index.json',
            'whats-new.json',
            'llms.txt',
            'llms-full.txt',
            'manifest.json',
            'service-worker.js',
            'robots.txt',
            'sitemap.xml'
          ]);
          const toRel = (url) => typeof url === 'string' && url.startsWith(base) ? url.slice(base.length) : null;
          const add = (rel) => {
            if (!rel) return;
            if (!fs.existsSync(rel)) {
              console.error(`Advertised public artifact missing locally: ${rel}`);
              process.exitCode = 1;
              return;
            }
            artifacts.add(rel);
          };
          const apiIndex = JSON.parse(fs.readFileSync('data/index.json', 'utf8'));
          for (const endpoint of apiIndex.endpoints || []) add(toRel(endpoint));
          const guidelineIndex = JSON.parse(fs.readFileSync('data/guidelines/index.json', 'utf8'));
          for (const guideline of guidelineIndex.data || []) add(toRel(guideline.url));
          if (process.exitCode) process.exit(process.exitCode);
          for (const artifact of [...artifacts].sort()) console.log(artifact);
          NODE
          mapfile -t artifacts < live-artifacts.txt
          mkdir -p live-artifacts
          for artifact in "${artifacts[@]}"; do
            expected="$(sha256sum "$artifact" | awk '{print $1}')"
            ok=0
            for i in $(seq 1 12); do
              mkdir -p "live-artifacts/$(dirname "$artifact")"
              curl -fsS "https://rkalani1.github.io/stroke/${artifact}?sha=${GITHUB_SHA}&artifact_try=${i}" -o "live-artifacts/${artifact}" || true
              if [ -f "live-artifacts/${artifact}" ]; then
                actual="$(sha256sum "live-artifacts/${artifact}" | awk '{print $1}')"
                if [ "$actual" = "$expected" ]; then
                  ok=1
                  break
                fi
              fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "Timed out waiting for live Pages artifact to match this commit: ${artifact}"
              exit 1
            fi
          done
          echo "Live Pages public artifacts match checked-out commit."

      - name: Run adaptive QA smoke (local + live)
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          node ./scripts/qa-smoke.mjs \
            --latency-profile adaptive \
            --latency-profiles-file docs/qa-latency-profiles.json \
            2>&1 | tee output/diagnostics/qa-smoke-adaptive.log

      # Non-blocking: strict latency enforcement against the live GitHub Pages CDN
      # is environment-sensitive. Structural validators and the smoke harness
      # above are hard gates; only threshold-only latency noise is advisory here.
      - name: Run adaptive latency threshold advisory (local + live)
        continue-on-error: true
        run: |
          mkdir -p output/diagnostics
          set -o pipefail
          node ./scripts/qa-smoke.mjs \
            --latency-profile adaptive \
            --latency-profiles-file docs/qa-latency-profiles.json \
            --enforce-latency-thresholds \
            2>&1 | tee output/diagnostics/qa-latency-threshold-advisory.log

      - name: Open or update failure alert issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'live-smoke-alert';
            const issueTitle = 'Live Smoke Audit failure';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const failureBody = [
              'Automated live smoke audit failed.',
              '',
              `- Run: ${runUrl}`,
              `- SHA: ${context.sha}`,
              `- Workflow: ${context.workflow}`,
              `- Event: ${context.eventName}`,
              '',
              'Please review workflow logs and uploaded smoke artifacts.'
            ].join('\\n');

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: 'B60205',
                description: 'Live smoke workflow failure requires review'
              });
            }

            const openAlerts = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100
            });

            if (openAlerts.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: openAlerts[0].number,
                body: `Another live smoke failure detected.\\n\\n${failureBody}`
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body: failureBody,
                labels: [label]
              });
            }

      - name: Optional external failure webhook alert
        if: failure()
        env:
          LIVE_SMOKE_ALERT_WEBHOOK: ${{ secrets.LIVE_SMOKE_ALERT_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_NAME: ${{ github.repository }}
          RUN_SHA: ${{ github.sha }}
          RUN_WORKFLOW: ${{ github.workflow }}
        run: |
          if [ -z "${LIVE_SMOKE_ALERT_WEBHOOK}" ]; then
            echo "LIVE_SMOKE_ALERT_WEBHOOK not configured; skipping external alert fan-out."
            exit 0
          fi

          message="Live Smoke Audit failure for ${REPO_NAME} | workflow=${RUN_WORKFLOW} | sha=${RUN_SHA} | run=${RUN_URL}"
          payload=$(printf '{"text":"%s"}' "$(echo "${message}" | sed 's/"/\\"/g')")
          curl -fsS -X POST \
            -H 'Content-Type: application/json' \
            -d "${payload}" \
            "${LIVE_SMOKE_ALERT_WEBHOOK}"

      - name: Resolve open failure alert issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'live-smoke-alert';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const openAlerts = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100
            });

            for (const issue of openAlerts) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Live smoke audit passed on ${new Date().toISOString()} in [run ${context.runId}](${runUrl}). Closing this alert.`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-artifacts
          path: |
            output/playwright
            output/diagnostics/churn-profile-validation.log
            output/diagnostics/qa-latency-profile-validation.log
            output/diagnostics/qa-structural-validation.log
            output/diagnostics/qa-smoke-adaptive.log
            output/diagnostics/qa-latency-threshold-advisory.log
            docs/evidence-churn-profiles.json
            docs/qa-latency-profiles.json
            docs/evidence-watchlist.md
            docs/evidence-watch-history.json
            docs/evidence-ops-index.md
          if-no-files-found: ignore
