    <style>
        /* CSS variables consolidated in tokens.css */
        html.dark body {
            background: radial-gradient(900px circle at 10% -10%, var(--app-bg-accent), transparent 60%),
                        linear-gradient(180deg, var(--app-bg) 0%, #0B0D10 100%);
            color: var(--text-strong);
        }
        /* Dark-theme tweaks for common Tailwind surface classes used throughout the app.
           These rely on CSS specificity rather than rewriting every className. */
        html.dark .bg-white,
        html.dark .bg-white\/95,
        html.dark .bg-white\/90,
        html.dark .bg-white\/80 {
            background-color: var(--surface) !important;
        }
        html.dark .bg-slate-50,
        html.dark .bg-slate-100 {
            background-color: var(--surface-2) !important;
        }
        html.dark .text-slate-900,
        html.dark .text-slate-800,
        html.dark .text-slate-700 {
            color: #e2e8f0 !important;
        }
        html.dark .text-slate-600,
        html.dark .text-slate-500 {
            color: #94a3b8 !important;
        }
        html.dark .border-slate-100,
        html.dark .border-slate-200,
        html.dark .border-slate-300 {
            border-color: rgba(148, 163, 184, 0.2) !important;
        }
        html.dark input,
        html.dark select,
        html.dark textarea {
            background-color: rgba(15, 23, 42, 0.9);
            color: #e2e8f0;
            border-color: rgba(148, 163, 184, 0.3);
        }
        html.dark ::placeholder { color: #64748b; }

        body {
            font-family: "Public Sans", "Segoe UI", sans-serif;
            background:
                radial-gradient(900px circle at 12% -10%, var(--app-bg-accent), transparent 60%),
                linear-gradient(180deg, var(--app-bg) 0%, var(--surface-3) 100%);
            color: var(--text-strong);
            font-size: 16px;
            line-height: 1.6;
        }
        html.dark body {
            background:
                radial-gradient(900px circle at 12% -10%, var(--app-bg-accent), transparent 60%),
                linear-gradient(180deg, var(--app-bg) 0%, #08090B 100%);
        }

        h1, h2, h3, h4, h5 {
            font-family: "Bricolage Grotesque", "Times New Roman", serif;
            letter-spacing: -0.01em;
        }

        .app-shell {
            background: var(--shell-bg);
            border: 1px solid var(--shell-border);
            box-shadow: var(--shell-shadow);
            border-radius: var(--radius-lg);
            backdrop-filter: saturate(140%) blur(10px);
        }

        .app-header {
            background: color-mix(in oklab, var(--surface) 92%, transparent);
            border-bottom: 1px solid var(--panel-border);
            padding: 0.75rem 1.1rem;
            backdrop-filter: blur(10px);
            border-radius: calc(var(--radius-lg) - 6px) calc(var(--radius-lg) - 6px) 0 0;
        }
        /* Brand mark accent treatment. */
        .app-header .border-cobalt-200.bg-cobalt-50.text-cobalt-700 {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 110%) !important;
            border-color: transparent !important;
            color: #fff !important;
            box-shadow: 0 8px 18px -10px color-mix(in oklab, var(--accent) 70%, transparent);
            border-radius: 10px !important;
        }
        .app-header h1.font-serif {
            background: linear-gradient(180deg, var(--text-strong) 0%, color-mix(in oklab, var(--text-strong) 70%, var(--accent) 30%) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-nav {
            background: var(--surface);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 0.3rem;
            box-shadow: var(--card-shadow);
        }

        .tool-card {
            box-shadow: var(--card-shadow);
            border-color: var(--panel-border);
            border-radius: var(--radius);
            transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
        }
        @media (prefers-reduced-motion: no-preference) {
            .tool-card:hover {
                transform: translateY(-1px);
                border-color: color-mix(in oklab, var(--accent) 30%, var(--panel-border));
                box-shadow: var(--shadow-pop);
            }
        }

        .tab-pill {
            border: none !important;
            background: transparent;
            border-radius: 999px;
            font-weight: 600;
            transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
        }
        .tab-pill.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 110%);
            color: #fff;
            box-shadow: 0 10px 24px -10px color-mix(in oklab, var(--accent) 65%, transparent);
        }
        .tab-pill.inactive {
            color: var(--text-muted);
        }
        .tab-pill.inactive:hover {
            background: var(--accent-soft);
            color: var(--accent-ink);
        }

        /* Sidebar layout on lg+ screens. */
        @media (min-width: 1024px) {
            .app-shell {
                display: grid;
                grid-template-columns: minmax(220px, 248px) 1fr;
                column-gap: 1.75rem;
                row-gap: 0;
                align-items: start;
            }
            .app-shell > .app-header,
            .app-shell > [role="alert"],
            .app-shell > [role="status"] {
                grid-column: 1 / -1;
            }
            .app-shell > .app-nav {
                grid-column: 1;
                align-self: start;
                position: sticky;
                /* U4 — offset the sidebar below the now-sticky header so it
                   doesn't tuck behind it; --app-header-h is published by an
                   effect, falls back to 0 before first paint. */
                top: var(--app-header-h, 0px);
                margin-bottom: 0 !important;
                max-height: calc(100vh - var(--app-header-h, 0px) - 1rem);
                overflow-y: auto;
                padding: 0.75rem 0.5rem !important;
            }
            .app-shell > #main {
                grid-column: 2;
                min-width: 0;
            }
            .app-shell > .app-nav nav {
                flex-direction: column !important;
                gap: 4px !important;
                overflow: visible !important;
                background: transparent !important;
                border: 0 !important;
                padding: 0 !important;
            }
            .app-shell > .app-nav .tab-pill {
                width: 100% !important;
                justify-content: flex-start !important;
                padding: 0.625rem 0.875rem !important;
                border-radius: 10px !important;
                text-align: left;
                flex: 0 0 auto !important;
                min-width: 0 !important;
                font-size: 13.5px !important;
                letter-spacing: -0.005em;
            }
            .app-shell > .app-nav .tab-pill.active {
                background: var(--accent-soft) !important;
                color: var(--accent-ink) !important;
                box-shadow: inset 3px 0 0 0 var(--accent), 0 1px 0 rgba(15,23,42,.02) !important;
            }
            .app-shell > .app-nav .tab-pill span {
                display: inline-flex;
                align-items: center;
                width: 100%;
                justify-content: flex-start;
            }
        }

        /* Mobile bottom nav accent surface. */
        nav[aria-label="Mobile navigation"] {
            background: color-mix(in oklab, var(--surface) 94%, transparent) !important;
            border-top: 1px solid var(--panel-border) !important;
            box-shadow: 0 -8px 24px -16px rgba(15, 23, 42, .18) !important;
            backdrop-filter: blur(12px);
        }
        nav[aria-label="Mobile navigation"] button {
            border-radius: 10px;
            margin: 6px 4px;
        }
        nav[aria-label="Mobile navigation"] button.text-cobalt-600 {
            color: var(--accent-ink) !important;
            background: var(--accent-soft);
        }
        nav[aria-label="Mobile navigation"] button.text-cobalt-600 i {
            color: var(--accent) !important;
        }

        .compact .p-4 { padding: 0.75rem !important; }
        .compact .p-3 { padding: 0.5rem !important; }
        .compact .gap-4 { gap: 0.75rem !important; }
        .compact .gap-3 { gap: 0.5rem !important; }
        .compact .space-y-4 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.75rem !important; }
        .compact .space-y-3 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.5rem !important; }


        @media (max-width: 640px) {
            .app-shell {
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            /* U12 — tighten phone header so more clinical content sits above the
               fold. The serif wordmark is already trimmed to 24px in JSX. */
            .app-header {
                padding: 0.625rem 1rem;
            }
            .app-nav {
                padding: 0.25rem;
            }
        }

        /* Mobile overflow fix - prevent horizontal scroll.
           Use overflow-x: clip (not hidden): clip suppresses horizontal scroll
           WITHOUT establishing a scroll container, so the sticky header (U4) can
           still pin to the viewport. overflow:hidden here would make body a
           scrollport and silently break position:sticky on descendants.
           Falls back to hidden on the rare engine without clip support. */
        html, body {
            overflow-x: hidden;
            overflow-x: clip;
            max-width: 100vw;
            -webkit-overflow-scrolling: touch;
        }

        * {
            box-sizing: border-box;
        }

        /* Reserve the full viewport for the app mount point BEFORE React paints,
           so the static footer parses below the fold and the first contentful
           paint does not shift the page in from an empty #root (CLS guard). */
        #root {
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Ensure all content respects viewport width */
        .main-container {
            max-width: 100%;
            overflow-x: hidden;
        }

        /* Fix for flex containers on mobile */
        @media (max-width: 640px) {
            .flex-wrap-mobile {
                flex-wrap: wrap !important;
            }

            /* Ensure buttons wrap properly on mobile */
            .flex.gap-2, .flex.gap-3 {
                flex-wrap: wrap;
            }

            /* Prevent long text from causing overflow */
            h1, h2, h3, h4, h5, p, span, a, button {
                word-wrap: break-word;
                overflow-wrap: break-word;
            }

            /* Fix for long URLs */
            a {
                word-break: break-all;
            }

            /* Ensure document cards don't overflow */
            .flex.items-center.justify-between {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            /* Make action buttons stack on very small screens */
            .flex.gap-2 > a,
            .flex.gap-2 > button {
                flex: 1 1 auto;
                min-width: 70px;
                text-align: center;
                justify-content: center;
            }
        }

        /* Extra small screen fixes */
        @media (max-width: 375px) {
            /* Smaller padding on very small screens */
            .p-4 {
                padding: 0.75rem !important;
            }
            .p-3 {
                padding: 0.5rem !important;
            }

            /* Smaller text */
            .text-lg {
                font-size: 1rem !important;
            }
            .text-sm {
                font-size: 0.75rem !important;
            }
        }

        /* Fix for date and time inputs on mobile */
        @media (max-width: 640px) {
            input[type="date"],
            input[type="time"] {
                max-width: 100%;
                min-width: 0;
                font-size: 16px !important; /* Prevents zoom on iOS */
                padding-left: 8px !important;
                padding-right: 8px !important;
            }
        }

        /* U1 — iOS Safari auto-zooms on focus of any form control whose computed
           font-size is < 16px. Several inputs carry .text-sm / .text-xs (and the
           ≤375px block above shrinks .text-sm to 12px with !important), so a
           plain utility floor can't win. Force the 16px no-zoom floor here with
           !important, on phone only — desktop sizing is untouched. */
        @media (max-width: 767px) {
            input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"]):not([type="range"]),
            select:not([data-skip-zoom-floor]),
            textarea:not([data-skip-zoom-floor]) {
                font-size: 16px !important;
            }
        }

        /* Neutral overrides removed - using slate palette consistently */

        /* Tooltip styles */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: min(250px, 90vw);
            background-color: #1a202c;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 1000;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.875rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #1a202c transparent transparent transparent;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* Touch targets minimum 44px */
        button, input[type="checkbox"], input[type="radio"], select {
            min-height: 44px;
            min-width: 44px;
        }
        input[type="checkbox"], input[type="radio"] {
            width: 20px;
            height: 20px;
            margin: 12px;
        }

        /* Success animation */
        @keyframes successPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .success-pulse {
            animation: successPulse 0.6s;
        }

        /* Alert flash animation for thrombolysis window */
        @keyframes alertFlash {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
                transform: scale(1);
            }
            25% {
                box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0.6);
                transform: scale(1.02);
            }
            50% {
                box-shadow: 0 0 30px 15px rgba(239, 68, 68, 0.4);
                transform: scale(1.01);
            }
            75% {
                box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0.6);
                transform: scale(1.02);
            }
        }
        .alert-flash {
            animation: alertFlash 1s ease-in-out infinite;
        }


        /* Fade in animation for FAB */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out forwards;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #0C7C8C;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Screen reader only content */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        .focus\:not-sr-only:focus {
            position: static;
            width: auto;
            height: auto;
            padding: inherit;
            margin: inherit;
            overflow: visible;
            clip: auto;
            white-space: normal;
        }

        /* Print styles */
        @media print {
            /* Hide unnecessary elements */
            button, .no-print, [data-lucide="search"], .dark-mode-toggle,
            nav, .breadcrumb, .keyboard-help, .mobile-nav {
                display: none !important;
            }

            /* Optimize for print */
            body {
                background: white;
                color: black;
                font-size: 12pt;
            }

            /* Page breaks */
            .page-break {
                page-break-after: always;
            }

            h1, h2, h3 {
                page-break-after: avoid;
            }

            /* Show URLs for links */
            a[href]:after {
                content: " (" attr(href) ")";
                font-size: 0.8em;
                color: #666;
            }

            /* Optimize tables and calculators for print */
            table, .calculator, .score-card {
                page-break-inside: avoid;
            }

            /* Remove shadows and unnecessary styling */
            * {
                box-shadow: none !important;
                text-shadow: none !important;
            }

            /* Ensure good contrast */
            .bg-gray-50, .bg-cobalt-50, .bg-green-50, .bg-yellow-50, .bg-red-50 {
                background: white !important;
                border: 1px solid #ddd !important;
            }
        }

        /* Safe area insets for notched devices */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .mb-safe {
            margin-bottom: env(safe-area-inset-bottom, 0);
        }
        /* PWA standalone-mode notch handling. The header sits at the very top
           of the viewport once installed; without these, the title overlaps
           the iPhone status-bar area. Wrapped in @supports so older browsers
           that don't understand env() simply ignore the rule. */
        @supports (padding: env(safe-area-inset-top)) {
            .pwa-safe-top {
                padding-top: calc(env(safe-area-inset-top, 0) + 0.25rem);
            }
            .pwa-safe-bottom {
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
            .pwa-safe-x {
                padding-left: env(safe-area-inset-left, 0);
                padding-right: env(safe-area-inset-right, 0);
            }
        }
        .fab-offset {
            bottom: 1.5rem;
        }
        .fab-layer {
            z-index: 60;
        }

        .action-bar-shadow {
            box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.12);
        }
        /* FAB positioning with safe area */

        /* Better mobile touch feedback */
        @media (max-width: 640px) {
            button, a {
                -webkit-tap-highlight-color: rgba(10, 101, 113, 0.2);
            }

            /* Larger touch targets for mobile */
            .touch-target {
                min-height: 48px;
                min-width: 48px;
            }

            /* Prevent text selection on interactive elements */
            button, .btn, [role="button"] {
                -webkit-user-select: none;
                user-select: none;
            }
        }
        @media (max-width: 640px) {
            body {
                font-size: 17px;
            }
        }

        /* Smooth scrolling for the entire app */
        html {
            scroll-behavior: smooth;
        }

        /* Better focus visibility for accessibility */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* mermaid CSS removed — algorithms now use JSX */
    </style>
    <script>
        // CRITICAL: Version management and automatic data cleanup
        // This runs BEFORE React loads to prevent crashes from incompatible data
        (function() {
            const APP_VERSION = '6.10.1'; // Keep in sync with service-worker.js APP_VERSION/CACHE_NAME, the ?v= asset queries, and package.json version
            const STORAGE_PREFIX = 'strokeApp:';
            const APP_DATA_KEY = 'stroke.appData.v2';
            const IS_PUBLIC_PAGES = /(^|\.)github\.io$/i.test(window.location.hostname || '');
            const LEGACY_KEYS = [
                'app_version',
                'darkMode',
                'activeTab',
                'patientData',
                'nihssScore',
                'aspectsScore',
                'gcsItems',
                'mrsScore',
                'ichScoreItems',
                'abcd2Items',
                'chads2vascItems',
                'ropeItems',
                'huntHessGrade',
                'wfnsGrade',
                'hasbledItems',
                'rcvs2Items',
                'strokeCodeForm',
                'lkwTime',
                'currentStep',
                'completedSteps',
                'aspectsRegionState',
                'pcAspectsRegions',
                'telestrokeNote',
                'telestrokeTemplate',
                'thrombolysisAlertsMuted',
                'timerSidebarCollapsed',
                'shiftPatients',
                'currentPatientId',
                'consultationType',
                'ttlHoursOverride',
                'lastUpdated',
                'legacyMigrated'
            ];
            const LEGACY_SESSION_KEYS = ['error_reload_attempted'];

            const parseStoredValue = (raw) => {
                if (raw === null || raw === undefined) return null;
                try {
                    return JSON.parse(raw);
                } catch {
                    return raw;
                }
            };

            const getStoredValue = (key) => {
                const namespaced = localStorage.getItem(STORAGE_PREFIX + key);
                if (namespaced !== null) {
                    return parseStoredValue(namespaced);
                }
                return parseStoredValue(localStorage.getItem(key));
            };

            const setStoredValue = (key, value) => {
                try {
                    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
                } catch (e) {
                    console.warn('Failed to write storage key:', key, e);
                }
            };

            const clearAppStorage = (options = {}) => {
                const includeLegacy = options.includeLegacy !== false;
                try {
                    Object.keys(localStorage).forEach((key) => {
                        if (key.startsWith(STORAGE_PREFIX)) {
                            localStorage.removeItem(key);
                        }
                    });
                    localStorage.removeItem(APP_DATA_KEY);
                    if (includeLegacy) {
                        LEGACY_KEYS.forEach((key) => localStorage.removeItem(key));
                    }
                    Object.keys(sessionStorage).forEach((key) => {
                        if (key.startsWith(STORAGE_PREFIX)) {
                            sessionStorage.removeItem(key);
                        }
                    });
                    LEGACY_SESSION_KEYS.forEach((key) => sessionStorage.removeItem(key));
                } catch (e) {
                    console.warn('Storage clear failed:', e);
                }
            };

            window.strokeAppStorage = {
                prefix: STORAGE_PREFIX,
                appDataKey: APP_DATA_KEY,
                legacyKeys: LEGACY_KEYS,
                legacySessionKeys: LEGACY_SESSION_KEYS,
                getStoredValue,
                setStoredValue,
                clearAppStorage,
                appVersion: APP_VERSION
            };

            const storedVersion = getStoredValue('app_version');
            const storedDarkMode = getStoredValue('darkMode') === true;

            // If version doesn't match, clear app storage to prevent crashes
            if (storedVersion && storedVersion !== APP_VERSION) {
                console.log('Version change detected (' + storedVersion + ' -> ' + APP_VERSION + '). Clearing app storage for compatibility.');
                clearAppStorage({ includeLegacy: false });
                if (!IS_PUBLIC_PAGES && storedDarkMode) {
                    setStoredValue('darkMode', true);
                }
            }

            setStoredValue('app_version', APP_VERSION);

            // Theme initialization — pre-paint, MUST mirror the app theme controller
            // so all three theme surfaces agree at first
            // paint (no FOUC). Public default (unset) = light; an explicit Dark or
            // System(auto) choice from the 3-way control persists and is honored.
            if (IS_PUBLIC_PAGES) {
                // Legacy v5 'darkMode' key is superseded by stroke.v7.theme — clean it
                // up, but do NOT wipe the v7 pref (that was the bug that made Dark
                // unreachable on public).
                try { localStorage.removeItem('darkMode'); } catch (e) { /* ignore */ }
                let v7pref = null;
                try { v7pref = localStorage.getItem('stroke.v7.theme'); } catch (e) { /* ignore */ }
                const eff = v7pref === 'dark'
                    ? 'dark'
                    : (v7pref === 'auto'
                        ? ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light')
                        : 'light'); // unset or 'light' → light (preserves fresh-public-load = light)
                document.documentElement.classList.toggle('dark', eff === 'dark');
                document.documentElement.setAttribute('data-theme', eff);
            } else {
                // Non-public build: legacy darkMode path unchanged; app.js
                // runV7Migration() carries it forward into stroke.v7.theme.
                const darkMode = getStoredValue('darkMode') === true;
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            }
        })();
    </script>
</head>
<body>
    <noscript>
        <div style="padding: 40px; font-family: Arial; max-width: 600px; margin: 0 auto; text-align: center;">
            <h1>Stroke CDS Educational Demo</h1>
            <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>
    <div id="root"></div>

    <script>
        // Enhanced error handler with automatic recovery
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error caught:', msg, 'at line', lineNo);

            // If critical error occurs, clear localStorage and reload ONCE
            if (msg && (msg.includes('is not a function') || msg.includes('undefined'))) {
                const hasReloaded = sessionStorage.getItem('error_reload_attempted');
                if (!hasReloaded) {
                    console.log('Critical error detected. Clearing data and reloading...');
                    try {
                        sessionStorage.setItem('error_reload_attempted', 'true');
                    } catch (e) {
                        console.warn('Unable to set session flag:', e);
                    }
                    if (window.strokeAppStorage && typeof window.strokeAppStorage.clearAppStorage === 'function') {
                        window.strokeAppStorage.clearAppStorage();
                    } else {
                        localStorage.clear();
                        sessionStorage.clear();
                    }
                    try {
                        sessionStorage.setItem('error_reload_attempted', 'true');
                    } catch (e) {
                        console.warn('Unable to reset session flag:', e);
                    }
                    window.location.reload();
                } else {
                    // If already reloaded once, show error message instead of infinite loop.
                    const root = document.getElementById('root');
                    if (root) {
                        root.textContent = '';
                        const container = document.createElement('div');
                        container.style.cssText = 'padding: 40px; font-family: Arial; max-width: 600px; margin: 0 auto;';

                        const title = document.createElement('h1');
                        title.style.color = '#dc2626';
                        title.textContent = 'Unable to Load Application';
                        container.appendChild(title);

                        const intro = document.createElement('p');
                        intro.style.cssText = 'color: #374151; margin: 20px 0;';
                        intro.textContent = 'A critical error occurred. Please try:';
                        container.appendChild(intro);

                        const list = document.createElement('ol');
                        list.style.color = '#374151';
                        for (const itemText of [
                            'Use a different browser (Chrome, Firefox, Safari)',
                            'Try Incognito/Private mode',
                            'Contact support if issue persists'
                        ]) {
                            const item = document.createElement('li');
                            item.textContent = itemText;
                            list.appendChild(item);
                        }
                        container.appendChild(list);

                        const details = document.createElement('p');
                        details.style.cssText = 'color: #6b7280; font-size: 14px; margin-top: 30px;';
                        details.textContent = 'Error: ' + String(msg || 'Unknown error');
                        container.appendChild(details);

                        root.appendChild(container);
                    }
                }
            }
            return false;
        };
    </script>
    <script src="app.js?v=6.10.1" defer></script>
</body>
</html>
